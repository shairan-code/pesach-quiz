<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חידון פסח הקהילתי - תוצאות לכולם</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --red: #e21b3c; --blue: #1368ce; --yellow: #d89e00; --green: #26890c; --purple: #46178f; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #f2f2f2; text-align: center; color: #333; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 95%; max-width: 1000px; }
        .admin-opt { padding: 35px; color: white; font-size: 1.8rem; border-radius: 15px; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; height: 70vh; margin-top: 15px; }
        .user-btn { border: none; border-radius: 20px; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.2); }
        button.main-btn { padding: 15px 30px; font-size: 1.2rem; background: var(--purple); color: white; border: none; border-radius: 10px; cursor: pointer; }
        #room-code { background: white; padding: 10px 25px; border-radius: 50px; font-size: 2rem; color: var(--purple); font-weight: bold; border: 3px solid var(--purple); margin-bottom: 20px; }
        .btn-red { background: var(--red); } .btn-blue { background: var(--blue); }
        .btn-yellow { background: var(--yellow); } .btn-green { background: var(--green); }
        table { width: 90%; max-width: 600px; margin-top: 20px; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        th, td { padding: 12px; border-bottom: 1px solid #eee; font-size: 1.1rem; }
        th { background: var(--purple); color: white; }
    </style>
</head>
<body>

<div id="setup-screen" class="screen active">
    <h1>חידון פסח הקהילתי 🍷</h1>
    <button class="main-btn" onclick="initAdmin()">אני המנהל (הצג על מסך)</button>
    <div style="margin-top: 40px; border-top: 2px solid #ccc; width: 80%; padding-top: 20px;">
        <h3>כניסת משתתף:</h3>
        <input type="text" id="username" placeholder="השם שלך" style="padding:10px; margin:5px;"><br>
        <input type="text" id="room-input" placeholder="קוד חדר" style="padding:10px; margin:5px;"><br>
        <button class="main-btn" onclick="initUser()" style="background: var(--green);">הצטרף</button>
    </div>
</div>

<div id="admin-screen" class="screen">
    <div id="room-code">מתחבר...</div>
    <div id="admin-q" style="font-size: 2.2rem; font-weight: bold; margin: 20px;"></div>
    <div class="admin-grid" id="admin-opts"></div>
    <div id="p-count" style="margin-top: 20px;">משתתפים: 0</div>
    <button id="next-btn" class="main-btn" onclick="nextQ()" style="margin-top: 30px;">התחל / שאלה הבאה</button>
</div>

<div id="user-screen" class="screen">
    <div id="u-status" style="font-size: 1.5rem; font-weight: bold;">ממתין למנהל...</div>
    <div class="user-grid" id="u-ctrl" style="display:none;">
        <button class="user-btn btn-red" onclick="sendAns(0)"></button>
        <button class="user-btn btn-blue" onclick="sendAns(1)"></button>
        <button class="user-btn btn-yellow" onclick="sendAns(2)"></button>
        <button class="user-btn btn-green" onclick="sendAns(3)"></button>
    </div>
</div>

<div id="leaderboard-screen" class="screen">
    <h1 id="leaderboard-title">🏆 תוצאות סופיות</h1>
    <table>
        <thead><tr><th>מקום</th><th>שם</th><th>ניקוד</th></tr></thead>
        <tbody id="leaderboard-body"></tbody>
    </table>
    <button class="main-btn" onclick="location.reload()" style="margin-top:20px;">משחק חדש</button>
</div>

<script>
    const quiz = [
        { q: "מי יודע שישה בשיר אחד מי יודע?", a: ["ימי בראשית", "אבות", "חומשי תורה", "שישה סדרי משנה"], c: 3 },
        { q: "מיהי שעמדה לאבותינו ולנו?", a: ["ציפורה", "מצווה לזכור", "ההבטחה שאלוקים שומר על ישראל", "הזרוע הנטויה"], c: 2 },
        { q: "כמה פעמים מופיע משה רבנו בהגדה?", a: ["3 פעמים", "פעם אחת בלבד", "47 פעמים", "20 פעמים"], c: 1 },
        { q: "מצה זו שאנו אוכלים על שום מה?", a: ["שום ופלפל", "הרעב במצרים", "לא הספיק בצקם להחמיץ", "איסור חמץ"], c: 2 },
        { q: "מה בנו בני ישראל בעיר רעמסס?", a: ["גשרים", "בתי כנסת", "ערי מסכנות ומחסנים", "פארקים"], c: 2 },
        { q: "מה קרה לחיילי פרעה שנכנסו לים?", a: ["טבעו בתוך הים", "הפכו לדגים", "חזרו למצרים", "נציב מלח"], c: 0 },
        { q: "מה שרו בני ישראל לאחר חציית הים?", a: ["תהילים", "שירת הים", "שיר השירים", "מגילת רות"], c: 1 },
        { q: "לכבוד מי מניחים כוס נוספת?", a: ["משה", "אהרן", "אליהו הנביא", "אלוקים"], c: 2 },
        { q: "מה פירוש המילה 'מן'?", a: ["לחם מהשמיים", "מים מהשמיים", "מים מהסלע", "בשר מהשמיים"], c: 0 },
        { q: "כמה ספרים יש בתורה?", a: ["1", "3", "4", "5"], c: 3 },
        { q: "מה עשו בני ישראל כשמשה היה בהר?", a: ["שרו ורקדו", "בנו עגל זהב", "ישנו", "הכינו סעודה"], c: 1 },
        { q: "מה שואל הילד הקטן בתחילת הסדר?", a: ["מתי אוכלים", "אחד מי יודע", "מה נשתנה", "חד גדיא"], c: 2 },
        { q: "כמה דיברות קיבל משה בהר סיני?", a: ["12", "10", "8", "6"], c: 1 },
        { q: "חד גדיא: מי אכל את הגדי?", a: ["הכלב", "האריה", "הנחש", "החתול"], c: 3 },
        { q: "מה מרחו בני ישראל על המשקוף?", a: ["שמן זית", "יין", "מים", "דם"], c: 3 },
        { q: "מה קוראים בבית הכנסת בפסח?", a: ["קהלת", "מגילת אסתר", "שיר השירים", "מגילת רות"], c: 2 },
        { q: "כמה שלבים יש בסדר ליל הסדר?", a: ["10", "12", "15", "18"], c: 2 }
    ];

    let peer, conn, current = -1, players = {};

    function initAdmin() {
        const shortId = Math.random().toString(36).substr(2, 5).toUpperCase();
        peer = new Peer(shortId);
        peer.on('open', id => {
            document.getElementById('room-code').innerText = "קוד חדר: " + id;
            show('admin-screen');
        });
        peer.on('connection', c => {
            c.on('data', d => {
                if(d.type === 'join') {
                    players[c.peer] = { name: d.name, score: 0, conn: c };
                    document.getElementById('p-count').innerText = "משתתפים: " + Object.keys(players).length;
                }
                if(d.type === 'ans' && d.v === quiz[current].c) players[c.peer].score += 100;
            });
        });
    }

    function initUser() {
        const name = document.getElementById('username').value;
        const code = document.getElementById('room-input').value.toUpperCase();
        if(!name || !code) return alert("מלא פרטים!");
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect(code);
            conn.on('open', () => {
                conn.send({type: 'join', name: name});
                show('user-screen');
            });
            conn.on('data', d => {
                if(d.type === 'next') {
                    document.getElementById('u-ctrl').style.display = 'grid';
                    document.getElementById('u-status').innerText = "בחר צבע!";
                }
                if(d.type === 'end') renderTable(d.data);
            });
        });
    }

    function nextQ() {
        current++;
        if(current >= quiz.length) {
            const finalScores = Object.values(players).map(p => ({name: p.name, score: p.score})).sort((a,b) => b.score - a.score);
            Object.values(players).forEach(p => p.conn.send({type: 'end', data: finalScores}));
            renderTable(finalScores);
            return;
        }
        const q = quiz[current];
        document.getElementById('admin-q').innerText = q.q;
        const ui = document.getElementById('admin-opts'); ui.innerHTML = "";
        const colors = ['btn-red', 'btn-blue', 'btn-yellow', 'btn-green'];
        q.a.forEach((t, i) => ui.innerHTML += `<div class="admin-opt ${colors[i]}">${t}</div>`);
        Object.values(players).forEach(p => p.conn.send({type: 'next'}));
    }

    function renderTable(data) {
        show('leaderboard-screen');
        const body = document.getElementById('leaderboard-body');
        body.innerHTML = "";
        data.forEach((p, i) => {
            body.innerHTML += `<tr><td>${i+1}</td><td>${p.name}</td><td>${p.score}</td></tr>`;
        });
    }

    function sendAns(i) {
        conn.send({type: 'ans', v: i});
        document.getElementById('u-ctrl').style.display = 'none';
        document.getElementById('u-status').innerText = "נשלח!";
    }

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
