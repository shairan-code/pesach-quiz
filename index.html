<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חידון פסח הקהילתי - Pro Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --red: #e21b3c; --blue: #1368ce; --yellow: #d89e00; --green: #26890c; --purple: #46178f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f2f2f2; text-align: center; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 95%; max-width: 1000px; }
        .admin-opt { padding: 30px; color: white; font-size: 1.5rem; border-radius: 15px; font-weight: bold; position: relative; }
        .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; height: 70vh; }
        .user-btn { border: none; border-radius: 20px; cursor: pointer; }
        button.main-btn { padding: 12px 25px; font-size: 1.1rem; background: var(--purple); color: white; border: none; border-radius: 10px; cursor: pointer; margin: 5px; }
        #room-code { background: white; padding: 10px 25px; border-radius: 50px; font-size: 1.8rem; color: var(--purple); font-weight: bold; border: 3px solid var(--purple); margin-bottom: 10px; }
        .qr-container { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin: 10px; display: inline-block; }
        .link-text { font-size: 0.8rem; color: var(--blue); margin-top: 5px; font-weight: bold; }
        .timer { font-size: 3rem; font-weight: bold; color: var(--red); margin: 10px; }
        .chart-box { background: white; padding: 20px; border-radius: 15px; margin-top: 20px; width: 80%; max-width: 600px; display: none; }
        .btn-red { background: var(--red); } .btn-blue { background: var(--blue); }
        .btn-yellow { background: var(--yellow); } .btn-green { background: var(--green); }
    </style>
</head>
<body>

<div id="setup-screen" class="screen active">
    <h1>חידון פסח הקהילתי 🍷</h1>
    <div class="qr-container"><div id="qr-home"></div><div class="link-text">shairan-code.github.io/pesach-quiz/</div></div>
    <button class="main-btn" onclick="initAdmin()">אני המנהל (הקרנה)</button>
    <button class="main-btn" style="background: var(--blue);" onclick="show('creator-screen')">➕ טען חידון</button>
    <div style="margin-top: 20px;">
        <input type="text" id="username" placeholder="השם שלך" style="padding:10px;"><br>
        <input type="text" id="room-input" placeholder="קוד חדר" style="padding:10px; margin-top:5px;"><br>
        <button class="main-btn" onclick="initUser()" style="background: var(--green);">הצטרף כשחקן</button>
    </div>
</div>

<div id="admin-screen" class="screen">
    <div style="display: flex; align-items: center; justify-content: space-around; width: 100%; max-width: 900px;">
        <div class="qr-container" style="padding: 10px;">
            <div id="qr-admin"></div>
            <div id="admin-link-display" class="link-text"></div>
        </div>
        <div>
            <div id="room-code">מייצר קוד...</div>
            <div id="timer-display" class="timer">15</div>
            <div id="p-count">משתתפים: 0</div>
        </div>
    </div>

    <div id="admin-q" style="font-size: 2rem; font-weight: bold; margin: 20px;"></div>
    <div class="admin-grid" id="admin-opts"></div>
    
    <div id="analysis-container" class="chart-box">
        <canvas id="currentChart"></canvas>
    </div>

    <button id="next-btn" class="main-btn" onclick="nextQ()" style="margin-top: 20px;">שאלה הבאה</button>
</div>

<div id="user-screen" class="screen">
    <div id="u-status" style="font-size: 1.5rem;">ממתין למנהל...</div>
    <div id="u-ctrl" class="user-grid" style="display:none;">
        <button class="user-btn btn-red" onclick="sendAns(0)"></button>
        <button class="user-btn btn-blue" onclick="sendAns(1)"></button>
        <button class="user-btn btn-yellow" onclick="sendAns(2)"></button>
        <button class="user-btn btn-green" onclick="sendAns(3)"></button>
    </div>
</div>

<div id="leaderboard-screen" class="screen">
    <h1>🏆 סיכום תוצאות</h1>
    <div class="chart-box" style="display:block;"><canvas id="historyChart"></canvas></div>
    <table id="leaderboard-table" style="width: 80%; background: white; margin-top:20px; border-radius:10px;">
        <tbody id="leaderboard-body"></tbody>
    </table>
    <button class="main-btn" onclick="location.reload()">סגור</button>
</div>

<script>
    const SITE_URL = "https://shairan-code.github.io/pesach-quiz/";
    let quiz = [
        { q: "מי יודע שישה?", a: ["בראשית", "אבות", "תורה", "משנה"], c: 3 },
        { q: "מה מרחו על המשקוף?", a: ["שמן", "יין", "מים", "דם"], c: 3 }
    ];

    let peer, conn, current = -1, players = {}, currentVotes = [0,0,0,0], historyAccuracy = [];
    let timerInterval, timeLeft = 15;
    let currentChart;

    window.onload = function() {
        new QRCode(document.getElementById("qr-home"), { text: SITE_URL, width: 120, height: 120 });
    };

    function initAdmin() {
        const id = Math.random().toString(36).substr(2, 5).toUpperCase();
        peer = new Peer(id);
        peer.on('open', () => { 
            document.getElementById('room-code').innerText = "חדר: " + id; 
            // יצירת QR ספציפי למנהל שכולל את קוד החדר בקישור (אופציונלי) או פשוט הלינק הכללי
            document.getElementById('qr-admin').innerHTML = "";
            new QRCode(document.getElementById("qr-admin"), { text: SITE_URL, width: 130, height: 130 });
            document.getElementById('admin-link-display').innerText = SITE_URL;
            show('admin-screen'); 
        });
        
        peer.on('connection', c => {
            c.on('data', d => {
                if(d.type === 'join') { 
                    players[c.peer] = { name: d.name, score: 0, conn: c }; 
                    updatePCount(); 
                }
                if(d.type === 'ans') {
                    currentVotes[d.v]++;
                    if(d.v === quiz[current].c) players[c.peer].score += 100;
                }
            });
        });
    }

    // פונקציות הניהול נשארות כפי שהיו
    function startTimer() {
        timeLeft = 15;
        document.getElementById('timer-display').innerText = timeLeft;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-display').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                stopVoting();
            }
        }, 1000);
    }

    function stopVoting() {
        Object.values(players).forEach(p => p.conn.send({type: 'stop'}));
        showAnalysis();
    }

    function showAnalysis() {
        const total = currentVotes.reduce((a,b)=>a+b, 0);
        const acc = total > 0 ? (currentVotes[quiz[current].c] / total * 100) : 0;
        historyAccuracy.push(acc);
        document.getElementById('analysis-container').style.display = 'block';
        const ctx = document.getElementById('currentChart').getContext('2d');
        if(currentChart) currentChart.destroy();
        currentChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['אדום', 'כחול', 'צהוב', 'ירוק'],
                datasets: [{ data: currentVotes, backgroundColor: ['#e21b3c', '#1368ce', '#d89e00', '#26890c'] }]
            },
            options: { plugins: { legend: {display: false} } }
        });
    }

    function nextQ() {
        current++;
        if(current >= quiz.length) return finishGame();
        currentVotes = [0,0,0,0];
        document.getElementById('analysis-container').style.display = 'none';
        document.getElementById('admin-q').innerText = quiz[current].q;
        const ui = document.getElementById('admin-opts'); ui.innerHTML = "";
        ['btn-red','btn-blue','btn-yellow','btn-green'].forEach((c,i) => {
            if(quiz[current].a[i]) ui.innerHTML += `<div class="admin-opt ${c}">${quiz[current].a[i]}</div>`;
        });
        startTimer();
        Object.values(players).forEach(p => p.conn.send({type: 'next'}));
    }

    function initUser() {
        const name = document.getElementById('username').value, code = document.getElementById('room-input').value.toUpperCase();
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect(code);
            conn.on('open', () => { conn.send({type: 'join', name: name}); show('user-screen'); });
            conn.on('data', d => {
                if(d.type === 'next') { document.getElementById('u-ctrl').style.display = 'grid'; document.getElementById('u-status').innerText = "בחר!"; }
                if(d.type === 'stop') { document.getElementById('u-ctrl').style.display = 'none'; document.getElementById('u-status').innerText = "זמן עבר!"; }
                if(d.type === 'end') renderTable(d.data);
            });
        });
    }

    function finishGame() {
        const scores = Object.values(players).map(p => ({name: p.name, score: p.score})).sort((a,b)=>b.score-a.score);
        Object.values(players).forEach(p => p.conn.send({type: 'end', data: scores}));
        renderTable(scores);
    }

    function renderTable(data) {
        show('leaderboard-screen');
        const b = document.getElementById('leaderboard-body'); b.innerHTML = "";
        data.forEach(p => b.innerHTML += `<tr><td>${p.name}</td><td>${p.score}</td></tr>`);
        const ctxH = document.getElementById('historyChart').getContext('2d');
        new Chart(ctxH, {
            type: 'line',
            data: {
                labels: historyAccuracy.map((_,i)=>`שאלה ${i+1}`),
                datasets: [{ label: 'אחוז דיוק קבוצתי', data: historyAccuracy, borderColor: '#46178f' }]
            }
        });
    }

    function sendAns(v) { conn.send({type: 'ans', v: v}); document.getElementById('u-ctrl').style.display = 'none'; document.getElementById('u-status').innerText = "נקלט!"; }
    function updatePCount() { document.getElementById('p-count').innerText = "משתתפים: " + Object.keys(players).length; }
    function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
</script>
</body>
</html>
