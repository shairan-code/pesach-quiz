<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חידון פסח - קוד קצר</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --red: #e21b3c; --blue: #1368ce; --yellow: #d89e00; --green: #26890c; --purple: #46178f; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #f2f2f2; text-align: center; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 90%; max-width: 1000px; }
        .admin-opt { padding: 40px; color: white; font-size: 1.8rem; border-radius: 15px; font-weight: bold; }
        .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; height: 70vh; }
        .user-btn { border: none; border-radius: 20px; cursor: pointer; }
        button.main-btn { padding: 15px 30px; font-size: 1.2rem; background: var(--purple); color: white; border: none; border-radius: 10px; cursor: pointer; }
        #room-code { background: white; padding: 15px 30px; border-radius: 50px; font-size: 2.2rem; color: var(--purple); font-weight: bold; border: 4px solid var(--purple); margin: 20px; letter-spacing: 5px; }
        .btn-red { background: var(--red); } .btn-blue { background: var(--blue); }
        .btn-yellow { background: var(--yellow); } .btn-green { background: var(--green); }
    </style>
</head>
<body>

<div id="setup-screen" class="screen active">
    <h1>חידון פסח הקהילתי 🍷</h1>
    <button class="main-btn" onclick="initAdmin()">אני המנהל (קבלת קוד חדר)</button>
    <div style="margin-top: 40px; border-top: 2px solid #ccc; width: 80%; padding-top: 20px;">
        <h3>כניסת משתתף:</h3>
        <input type="text" id="username" placeholder="השם שלך" style="padding:10px; margin:5px;"><br>
        <input type="text" id="room-input" placeholder="קוד חדר (5 תווים)" style="padding:10px; margin:5px;"><br>
        <button class="main-btn" onclick="initUser()" style="background: var(--green);">הצטרף</button>
    </div>
</div>

<div id="admin-screen" class="screen">
    <div id="room-code">מייצר קוד חדר...</div>
    <div id="admin-q" style="font-size: 2.5rem; font-weight: bold; margin: 20px;"></div>
    <div class="admin-grid" id="admin-opts"></div>
    <div id="p-count" style="margin-top: 20px;">משתתפים: 0</div>
    <button class="main-btn" onclick="nextQ()" style="margin-top: 30px;">שאלה הבאה</button>
</div>

<div id="user-screen" class="screen">
    <div id="u-status" style="font-size: 1.5rem; font-weight: bold;">ממתין למנהל...</div>
    <div class="user-grid" id="u-ctrl" style="display:none;">
        <button class="user-btn btn-red" onclick="sendAns(0)"></button>
        <button class="user-btn btn-blue" onclick="sendAns(1)"></button>
        <button class="user-btn btn-yellow" onclick="sendAns(2)"></button>
        <button class="user-btn btn-green" onclick="sendAns(3)"></button>
    </div>
</div>

<script>
    const quiz = [
        { q: "מי יודע שישה בשיר אחד מי יודע?", a: ["ימי בראשית", "אבות", "חומשי תורה", "שישה סדרי משנה"], c: 3 },
        { q: "מיהי שעמדה לאבותינו ולנו?", a: ["ציפורה", "מצווה לזכור", "ההבטחה שאלוקים שומר על ישראל", "הזרוע נטויה"], c: 2 },
        { q: "כמה פעמים מופיע משה רבנו בהגדה?", a: ["3 פעמים", "פעם אחת בלבד", "47 פעמים", "20 פעמים"], c: 1 },
        { q: "מצה זו שאנו אוכלים על שום מה?", a: ["שום ופלפל", "הרעב במצרים", "לא הספיק בצקם להחמיץ", "איסור חמץ"], c: 2 },
        { q: "מה שרו בני ישראל לאחר שעברו את הים?", a: ["תהילים", "שירת הים", "שיר השירים", "מגילת רות"], c: 1 },
        { q: "מי הם ארבעת הבנים?", a: ["חכם, רשע, תם, שאינו יודע לשאול", "חכם, תלמיד, שואל, שקט", "חכם, תם, לומד, מרדני", "חכם, שואל, קטן, תם"], c: 0 },
        { q: "מה הם עשרת המכות (בסדר הנכון)?", a: ["דם, צפרדע... מגפה", "צפרדע... שלג", "דם... סערה", "דם, צפרדע, כינים, ערוב, דבר, שחין, ברד, ארבה, חושך, בכורות"], c: 3 }
    ];

    let peer, conn, current = -1, players = {};

    // פונקציה לייצור קוד רנדומלי קצר
    function generateShortId() {
        return Math.random().toString(36).substr(2, 5).toUpperCase();
    }

    function initAdmin() {
        const shortId = generateShortId();
        peer = new Peer(shortId); // כאן אנחנו מבקשים מהשרת את הקוד הספציפי
        
        peer.on('open', id => {
            document.getElementById('room-code').innerText = "קוד חדר: " + id;
            show('admin-screen');
        });

        peer.on('error', err => {
            if(err.type === 'unavailable-id') {
                initAdmin(); // אם הקוד תפוס, נסה לייצר אחד אחר
            } else {
                alert("שגיאה: " + err.type);
            }
        });

        peer.on('connection', c => {
            c.on('data', d => {
                if(d.type === 'join') {
                    players[c.peer] = { name: d.name, conn: c, score: 0 };
                    document.getElementById('p-count').innerText = "משתתפים: " + Object.keys(players).length;
                }
                if(d.type === 'ans' && d.v === quiz[current].c) players[c.peer].score += 100;
            });
        });
    }

    function initUser() {
        const name = document.getElementById('username').value;
        const code = document.getElementById('room-input').value.toUpperCase();
        if(!name || !code) return alert("מלא שם וקוד!");
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect(code);
            conn.on('open', () => {
                conn.send({type: 'join', name: name});
                show('user-screen');
            });
            conn.on('data', d => {
                if(d.type === 'next') {
                    document.getElementById('u-ctrl').style.display = 'grid';
                    document.getElementById('u-status').innerText = "בחר צבע!";
                }
            });
        });
    }

    function nextQ() {
        current++;
        if(current >= quiz.length) return alert("סוף החידון!");
        const q = quiz[current];
        document.getElementById('admin-q').innerText = q.q;
        const ui = document.getElementById('admin-opts');
        ui.innerHTML = "";
        const colors = ['btn-red', 'btn-blue', 'btn-yellow', 'btn-green'];
        q.a.forEach((t, i) => ui.innerHTML += `<div class="admin-opt ${colors[i]}">${t}</div>`);
        Object.values(players).forEach(p => p.conn.send({type: 'next'}));
    }

    function sendAns(i) {
        conn.send({type: 'ans', v: i});
        document.getElementById('u-ctrl').style.display = 'none';
        document.getElementById('u-status').innerText = "נשלח!";
    }

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
